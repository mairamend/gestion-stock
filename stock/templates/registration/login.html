<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion — Gestion de Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full bg-white rounded-2xl border border-slate-200 shadow-xl p-8 space-y-6">
    
    <div class="text-center space-y-2">
        <div class="w-12 h-12 bg-indigo-600 text-white rounded-xl flex items-center justify-center mx-auto text-xl shadow-md">
            <i class="fa-solid fa-boxes-stacked"></i>
        </div>
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">StockPME </h1>
        <p class="text-sm text-slate-500">Connectez-vous pour gérer l'entrepôt</p>
    </div>

    {% if form.errors %}
    <div class="p-3 bg-rose-50 border border-rose-200 rounded-xl text-rose-700 text-xs font-medium flex items-center gap-2">
        <i class="fa-solid fa-circle-exclamation text-sm"></i>
        <span>Identifiant ou mot de passe incorrect.</span>
    </div>
    {% endif %}

    <form method="post" class="space-y-4">
        {% csrf_token %}
        
        <div>
            <label for="id_username" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Nom d'utilisateur</label>
            <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"><i class="fa-solid fa-user"></i></span>
                <input type="text" name="username" id="id_username" required autofocus
                    class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all" placeholder="ex: m.diallo"/>
            </div>
        </div>

        <div>
            <label for="id_password" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Mot de passe</label>
            <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"><i class="fa-solid fa-lock"></i></span>
                <input type="password" name="password" id="id_password" required
                    class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:bg-white transition-all" placeholder="••••••••"/>
            </div>
        </div>

        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-xl text-sm transition shadow-sm flex items-center justify-center gap-2 mt-2">
            <i class="fa-solid fa-right-to-bracket"></i> Se connecter
        </button>
    </form>
</div>

</body>
</html>
